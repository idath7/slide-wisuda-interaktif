<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audience Reaksi - MAS WAHAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #020c11; color: white; margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; overflow: hidden;
        }
        .container { width: 90%; max-width: 400px; }

        #welcome-info { margin-bottom: 30px; }
        .welcome-text { font-family: 'Cinzel', serif; color: #ffd700; font-size: 1.8rem; }

        /* Student Info Box */
        #student-info { 
            margin-bottom: 25px; display: none; 
            flex-direction: column; align-items: center; 
            animation: fadeIn 0.5s ease-in;
        }
        .foto-lingkaran {
            width: 130px; height: 130px; border-radius: 50%;
            border: 3px solid #ffd700; overflow: hidden;
            margin-bottom: 15px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .foto-lingkaran img { width: 100%; height: 100%; object-fit: cover; }
        
        #remote-nama { 
            font-family: 'Cinzel', serif; font-size: 1.5rem; 
            color: #ffd700; margin-bottom: 5px;
        }
        #remote-kelas { 
            font-size: 0.85rem; color: #cbd5e1; letter-spacing: 2px;
            background: rgba(255,215,0,0.1); padding: 5px 15px; border-radius: 20px;
        }

        .reaction-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
            background: rgba(255,255,255,0.03); padding: 20px;
            border-radius: 25px; border: 1px solid rgba(255,215,0,0.15);
            backdrop-filter: blur(10px);
        }
        .btn-reaction {
            background: rgba(255,255,255,0.08); border: none;
            font-size: 2.2rem; padding: 15px 5px; border-radius: 18px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-reaction:active { transform: scale(0.8); background: #ffd700; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .footer { margin-top: 30px; font-size: 0.6rem; color: #475569; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="welcome-info">
            <p class="welcome-text">MAS WAHAS</p>
            <p style="color:#94a3b8; font-size:0.8rem">SIAP MEMBERIKAN APRESIASI</p>
        </div>

        <div id="student-info">
            <div class="foto-lingkaran">
                <img src="" id="remote-foto" alt="Siswa">
            </div>
            <div id="remote-nama">Nama Siswa</div>
            <div id="remote-kelas">Kelas</div>
        </div>

        <div class="reaction-grid">
            <button class="btn-reaction" onclick="sendEmoji('👏')">👏</button>
            <button class="btn-reaction" onclick="sendEmoji('❤️')">❤️</button>
            <button class="btn-reaction" onclick="sendEmoji('🔥')">🔥</button>
            <button class="btn-reaction" onclick="sendEmoji('🎓')">🎓</button>
            <button class="btn-reaction" onclick="sendEmoji('✨')">✨</button>
            <button class="btn-reaction" onclick="sendEmoji('🥳')">🥳</button>
        </div>
        <div class="footer">INTERACTIVE GRADUATION SYSTEM</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const welcomeInfo = document.getElementById('welcome-info');
        const studentInfo = document.getElementById('student-info');

        function sendEmoji(emoji) {
            socket.emit('reaction', emoji);
        }

        socket.on('slide_changed', (data) => {
            console.log("Data diterima HP:", data); // Untuk cek di inspect HP
            
            if (!data || data.isWelcome) {
                welcomeInfo.style.display = 'block';
                studentInfo.style.display = 'none';
            } else {
                welcomeInfo.style.display = 'none';
                studentInfo.style.display = 'flex';

                // Pemetaan data yang fleksibel
                document.getElementById('remote-nama').innerText = data.nama || data.name || '-';
                document.getElementById('remote-kelas').innerText = data.kelas || data.nama_kelas || '-';
                
                // Update Foto
                const fotoImg = document.getElementById('remote-foto');
                if (data.foto) {
                    fotoImg.src = data.foto;
                    fotoImg.style.display = 'block';
                } else {
                    fotoImg.src = 'default-avatar.png'; // Sediakan gambar default jika foto kosong
                }
            }
        });
    </script>
</body>
</html>
