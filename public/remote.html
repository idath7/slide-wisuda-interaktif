<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interaktif Wisuda</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: #f8fafc; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }
        
        .profile-card {
            background: white; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex: 1; position: relative;
        }
        
        #status-koneksi {
            position: absolute; top: 15px;
            font-size: 11px; font-weight: bold; 
            padding: 5px 12px; border-radius: 20px; background: #f1f5f9;
        }

        /* TAMPILAN LOBI (Welcome) */
        #view-welcome {
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .w-title { font-family: 'Cinzel', serif; font-size: 2.2rem; color: #b8860b; margin: 0; }
        .w-subtitle { color: #64748b; margin-top: 10px; font-size: 1rem; }
        .w-icon { font-size: 4rem; margin-top: 15px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* TAMPILAN SISWA */
        #view-student {
            display: none; flex-direction: column; align-items: center; text-align: center; width: 100%;
        }
        .profile-foto { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #facc15; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 15px;}
        .profile-nama { font-size: 1.5rem; margin: 15px 0 5px 0; color: #1e293b; }
        .profile-jurusan { color: #64748b; margin: 0; font-size: 1rem; }

        /* Area Tombol Reaksi */
        .reaction-area { padding: 20px 20px 80px 20px; text-align: center; background: #f8fafc; }
        .reaction-title { color: #475569; font-size: 0.9rem; margin-bottom: 15px; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 400px; margin: 0 auto; }
        .btn { 
            font-size: 35px; padding: 15px 0; border: none; border-radius: 15px; 
            background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.08); cursor: pointer;
            transition: transform 0.1s, background 0.1s;
        }
        .btn:active { transform: scale(0.9); background: #e2e8f0; }
    </style>
</head>
<body>
    
    <div class="profile-card">
        <div id="status-koneksi" style="color: red;">🔴 Disconnected</div>
        
        <div id="view-welcome">
            <h2 class="w-title">MTS WAHID HASYIM BALUNG</h2>
            <p class="w-subtitle">Acara Pelepasan Siswa<br>Segera Dimulai...</p>
            <div class="w-icon">⏳</div>
        </div>

        <div id="view-student">
            <img src="https://via.placeholder.com/150" class="profile-foto" id="m-foto" alt="Siswa">
            <h2 class="profile-nama" id="m-nama">Memuat...</h2>
            <p class="profile-jurusan" id="m-jurusan">-</p>
        </div>
    </div>

    <div class="reaction-area">
        <div class="reaction-title">Beri dukungan untuk temanmu! 👇</div>
        <div class="grid">
            <button class="btn" onclick="sendReaction('🎉')">🎉</button>
            <button class="btn" onclick="sendReaction('🔥')">🔥</button>
            <button class="btn" onclick="sendReaction('❤️')">❤️</button>
            <button class="btn" onclick="sendReaction('👏')">👏</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const statusEl = document.getElementById('status-koneksi');
        const viewWelcome = document.getElementById('view-welcome');
        const viewStudent = document.getElementById('view-student');

        socket.on('connect', () => {
            statusEl.innerText = "🟢 Connected";
            statusEl.style.color = "green";
        });

        socket.on('disconnect', () => {
            statusEl.innerText = "🔴 Disconnected";
            statusEl.style.color = "red";
        });

        // Menerima perintah dari Layar Laptop
        socket.on('update_mobile_slide', (data) => {
            if (data && data.isWelcome) {
                // Tampilkan Mode Lobi
                viewWelcome.style.display = 'flex';
                viewStudent.style.display = 'none';
            } else if (data) {
                // Tampilkan Mode Profil Siswa
                viewWelcome.style.display = 'none';
                viewStudent.style.display = 'flex';
                
                document.getElementById('m-nama').innerText = data.nama;
                document.getElementById('m-jurusan').innerText = data.jurusan;
                document.getElementById('m-foto').src = data.foto;
            }
        });

        function sendReaction(emoji) {
            socket.emit('send_reaction', emoji);
            if (navigator.vibrate) navigator.vibrate(30);
        }
    </script>
</body>
</html>
